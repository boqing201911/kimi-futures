<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球期货溢价监控 Pro | Vercel Edge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }
        .pulse-up { animation: pulse-green 2s infinite; }
        .pulse-down { animation: pulse-red 2s infinite; }
        
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .grid-bg {
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-online { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .status-offline { background: #ef4444; }
        .status-loading { background: #f59e0b; animation: pulse 1.5s infinite; }
        
        .latency-good { color: #22c55e; }
        .latency-medium { color: #f59e0b; }
        .latency-bad { color: #ef4444; }
        
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .card-enter {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body class="grid-bg min-h-screen overflow-x-hidden">

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 glass border-b border-slate-700/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">Futures<span class="gradient-text">Arb</span> Pro</h1>
                        <p class="text-xs text-slate-400">Vercel Edge Network • 低延迟实时数据</p>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <div class="hidden md:flex items-center space-x-3 text-xs bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
                        <span class="text-slate-400">API延迟:</span>
                        <span id="latency" class="mono font-bold latency-good">--ms</span>
                    </div>
                    <div class="flex items-center space-x-2 text-sm bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
                        <span id="data-status" class="status-dot status-loading"></span>
                        <span id="status-text" class="text-slate-300 text-xs">连接中...</span>
                    </div>
                    <div class="mono text-sm text-slate-400 hidden sm:block" id="clock">--:--:--</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
        
        <!-- Status Banner -->
        <div class="mb-6 glass rounded-xl p-4 border border-blue-500/30 bg-blue-500/5">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/>
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-sm font-bold text-white">Vercel Edge Network</h3>
                        <p class="text-xs text-slate-400">Serverless API • 东方财富+新浪财经 • 自动故障转移</p>
                    </div>
                </div>
                <div class="flex gap-6 text-xs">
                    <div class="text-center">
                        <div class="text-slate-400 mb-1">USD/CNY</div>
                        <div class="mono text-blue-400 font-bold text-lg" id="fx-rate">--</div>
                    </div>
                    <div class="text-center">
                        <div class="text-slate-400 mb-1">更新频率</div>
                        <div class="mono text-green-400 font-bold text-lg">3s</div>
                    </div>
                    <div class="text-center">
                        <div class="text-slate-400 mb-1">下次刷新</div>
                        <div class="mono text-purple-400 font-bold text-lg" id="countdown">3</div>
                    </div>
                    <div class="text-center">
                        <div class="text-slate-400 mb-1">数据点</div>
                        <div class="mono text-orange-400 font-bold text-lg" id="data-points">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass rounded-xl p-6">
                <div class="text-slate-400 text-sm mb-1">监控品种</div>
                <div class="text-3xl font-bold text-white" id="total-pairs">--</div>
            </div>
            <div class="glass rounded-xl p-6">
                <div class="text-slate-400 text-sm mb-1">平均溢价</div>
                <div class="text-3xl font-bold" id="avg-premium">--%</div>
            </div>
            <div class="glass rounded-xl p-6">
                <div class="text-slate-400 text-sm mb-1">最大套利空间</div>
                <div class="text-3xl font-bold text-green-400" id="max-arbitrage">--%</div>
            </div>
            <div class="glass rounded-xl p-6">
                <div class="text-slate-400 text-sm mb-1">数据源状态</div>
                <div class="text-3xl font-bold text-blue-400">正常</div>
                <div class="text-xs text-slate-500 mt-1">东方财富+新浪</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="glass rounded-xl p-4 mb-6 flex flex-wrap gap-3 items-center justify-between">
            <div class="flex gap-2">
                <button onclick="filterCategory('all')" class="filter-btn px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium transition-all" data-category="all">全部</button>
                <button onclick="filterCategory('metal')" class="filter-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300 text-sm font-medium transition-all hover:bg-slate-600" data-category="metal">贵金属</button>
                <button onclick="filterCategory('energy')" class="filter-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300 text-sm font-medium transition-all hover:bg-slate-600" data-category="energy">能源</button>
                <button onclick="filterCategory('agri')" class="filter-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300 text-sm font-medium transition-all hover:bg-slate-600" data-category="agri">农产品</button>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleAutoRefresh()" id="auto-btn" class="px-4 py-2 rounded-lg bg-green-600 hover:bg-green-700 text-white text-sm font-medium transition-all flex items-center gap-2">
                    <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span>
                    自动刷新中
                </button>
                <button onclick="manualRefresh()" class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    立即刷新
                </button>
            </div>
        </div>

        <!-- Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" id="futures-grid">
            <div class="col-span-full text-center py-20">
                <div class="loading mb-4"></div>
                <p class="text-slate-400">正在连接Vercel Edge Network...</p>
                <p class="text-xs text-slate-500 mt-2">首次加载约1-2秒</p>
            </div>
        </div>

        <!-- Chart -->
        <div class="mt-8 glass rounded-xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-semibold text-white">溢价率实时监控</h3>
                <div class="flex gap-2 text-xs">
                    <span class="flex items-center gap-1 text-slate-400">
                        <span class="w-2 h-2 rounded-full bg-yellow-500"></span> 黄金
                    </span>
                    <span class="flex items-center gap-1 text-slate-400">
                        <span class="w-2 h-2 rounded-full bg-blue-500"></span> 原油
                    </span>
                </div>
            </div>
            <div class="h-64 w-full">
                <canvas id="premiumChart"></canvas>
            </div>
        </div>

    </main>

    <script>
        // 配置
        const API_BASE = '/api/data';  // 同域调用，Vercel自动路由
        let currentData = [];
        let chartInstance = null;
        let updateTimer = null;
        let countdown = 3;
        let currentFilter = 'all';
        let isAutoRefresh = true;
        let historyData = { gold: [], crude: [] };

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initClock();
            initChart();
            fetchData();
            startAutoUpdate();
        });

        function initClock() {
            setInterval(() => {
                document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN');
            }, 1000);
        }

        function initChart() {
            const ctx = document.getElementById('premiumChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 30}, (_, i) => i),
                    datasets: [{
                        label: '黄金',
                        data: [],
                        borderColor: '#fbbf24',
                        backgroundColor: 'rgba(251, 191, 36, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }, {
                        label: '原油',
                        data: [],
                        borderColor: '#60a5fa',
                        backgroundColor: 'rgba(96, 165, 250, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#94a3b8',
                            bodyColor: '#e2e8f0',
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { 
                                color: '#64748b',
                                callback: (v) => v.toFixed(1) + '%'
                            }
                        },
                        x: { display: false }
                    }
                }
            });
        }

        async function fetchData() {
            const startTime = performance.now();
            updateStatus('loading', '获取数据中...');
            
            try {
                // 调用Vercel API（批量获取，一次请求拿所有数据）
                const response = await fetch(`${API_BASE}?type=batch`);
                const result = await response.json();
                
                const latency = Math.round(performance.now() - startTime);
                updateLatency(latency);
                
                if (!result.success) {
                    throw new Error(result.error);
                }
                
                currentData = result.data.pairs;
                
                // 更新汇率显示
                document.getElementById('fx-rate').textContent = result.data.fxRate.toFixed(4);
                if (result.data.fxCached) {
                    document.getElementById('fx-rate').classList.add('text-yellow-400');
                }
                
                updateStatus('online', `数据更新 ${new Date().toLocaleTimeString()}`);
                renderGrid();
                updateStats();
                updateChart();
                
                // 记录历史数据
                const gold = currentData.find(d => d.id === 'gold');
                const crude = currentData.find(d => d.id === 'crude');
                if (gold) {
                    historyData.gold.push(gold.premium);
                    if (historyData.gold.length > 30) historyData.gold.shift();
                }
                if (crude) {
                    historyData.crude.push(crude.premium);
                    if (historyData.crude.length > 30) historyData.crude.shift();
                }
                
            } catch (error) {
                console.error('Fetch error:', error);
                updateStatus('offline', '获取失败，3秒后重试');
            }
        }

        function updateLatency(ms) {
            const el = document.getElementById('latency');
            el.textContent = ms + 'ms';
            el.className = 'mono font-bold ' + (ms < 200 ? 'latency-good' : ms < 500 ? 'latency-medium' : 'latency-bad');
        }

        function updateStatus(status, text) {
            const dot = document.getElementById('data-status');
            const label = document.getElementById('status-text');
            
            dot.className = 'status-dot status-' + status;
            label.textContent = text;
        }

        function renderGrid() {
            const grid = document.getElementById('futures-grid');
            grid.innerHTML = '';
            
            let filtered = currentFilter === 'all' ? currentData : currentData.filter(d => {
                const cats = { metal: ['gold', 'silver', 'copper', 'aluminum'], energy: ['crude'], agri: ['soybean', 'corn', 'wheat'] };
                return cats[currentFilter]?.includes(d.id);
            });
            
            filtered.forEach((item, index) => {
                const premiumClass = item.premium > 0 ? 'text-green-400' : 'text-red-400';
                const premiumBg = item.premium > 0 ? 'bg-green-500/10 border-green-500/30' : 'bg-red-500/10 border-red-500/30';
                const pulseClass = Math.abs(item.premium) > 2 ? (item.premium > 0 ? 'pulse-up' : 'pulse-down') : '';
                
                const card = document.createElement('div');
                card.className = `glass rounded-xl p-6 border ${premiumBg} ${pulseClass} card-enter transition-all hover:scale-[1.02]`;
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-lg font-bold text-white flex items-center gap-2">
                                ${item.name}
                                <span class="px-2 py-0.5 rounded text-[10px] bg-blue-500/20 text-blue-400 border border-blue-500/30">实时</span>
                            </h3>
                            <p class="text-xs text-slate-400 mt-1">${item.domestic} vs ${item.international}</p>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold mono ${premiumClass}">${item.premium > 0 ? '+' : ''}${item.premium.toFixed(2)}%</div>
                            <div class="text-xs text-slate-500">溢价率</div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-slate-800/50 rounded-lg p-3 border border-slate-700">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs text-slate-400 flex items-center gap-1">
                                    <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
                                    国内
                                </span>
                                <span class="text-[10px] text-slate-500">东方财富</span>
                            </div>
                            <div class="text-lg font-bold mono text-white">${formatPrice(item.domesticPrice)}</div>
                            <div class="text-xs ${item.domesticChange >= 0 ? 'text-green-400' : 'text-red-400'} flex items-center gap-1">
                                ${item.domesticChange >= 0 ? '↑' : '↓'} ${Math.abs(item.domesticChange).toFixed(2)}%
                            </div>
                        </div>
                        
                        <div class="bg-slate-800/50 rounded-lg p-3 border border-slate-700">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs text-slate-400 flex items-center gap-1">
                                    <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                                    国际
                                </span>
                                <span class="text-[10px] text-slate-500">新浪财经</span>
                            </div>
                            <div class="text-lg font-bold mono text-white">${formatPrice(item.intlPrice)}</div>
                            <div class="text-xs ${item.intlChange >= 0 ? 'text-green-400' : 'text-red-400'} flex items-center gap-1">
                                ${item.intlChange >= 0 ? '↑' : '↓'} ${Math.abs(item.intlChange).toFixed(2)}%
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center text-xs text-slate-500 border-t border-slate-700/50 pt-3">
                        <span>汇率 ${item.fxRate.toFixed(4)}</span>
                        <span>规模比 1:${item.conversion}</span>
                        <span class="mono">${new Date().toLocaleTimeString()}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function formatPrice(price) {
            if (price > 1000) return price.toLocaleString('zh-CN', {maximumFractionDigits: 0});
            if (price > 100) return price.toLocaleString('zh-CN', {maximumFractionDigits: 1});
            return price.toLocaleString('zh-CN', {maximumFractionDigits: 2});
        }

        function updateStats() {
            if (currentData.length === 0) return;
            
            document.getElementById('total-pairs').textContent = currentData.length;
            document.getElementById('data-points').textContent = historyData.gold.length;
            
            const premiums = currentData.map(d => d.premium);
            const avg = premiums.reduce((a, b) => a + b, 0) / premiums.length;
            const max = Math.max(...premiums.map(Math.abs));
            
            const avgEl = document.getElementById('avg-premium');
            avgEl.textContent = (avg > 0 ? '+' : '') + avg.toFixed(2) + '%';
            avgEl.className = 'text-3xl font-bold ' + (avg > 0 ? 'text-green-400' : 'text-red-400');
            
            document.getElementById('max-arbitrage').textContent = max.toFixed(2) + '%';
        }

        function updateChart() {
            if (!chartInstance) return;
            
            chartInstance.data.datasets[0].data = historyData.gold;
            chartInstance.data.datasets[1].data = historyData.crude;
            chartInstance.update('none');
        }

        function filterCategory(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isActive = btn.dataset.category === category;
                btn.className = `filter-btn px-4 py-2 rounded-lg text-sm font-medium transition-all ${isActive ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`;
            });
            renderGrid();
        }

        function toggleAutoRefresh() {
            isAutoRefresh = !isAutoRefresh;
            const btn = document.getElementById('auto-btn');
            if (isAutoRefresh) {
                btn.innerHTML = '<span class="w-2 h-2 bg-white rounded-full animate-pulse"></span>自动刷新中';
                btn.className = 'px-4 py-2 rounded-lg bg-green-600 hover:bg-green-700 text-white text-sm font-medium transition-all flex items-center gap-2';
            } else {
                btn.innerHTML = '<span class="w-2 h-2 bg-slate-400 rounded-full"></span>已暂停';
                btn.className = 'px-4 py-2 rounded-lg bg-slate-600 hover:bg-slate-500 text-white text-sm font-medium transition-all flex items-center gap-2';
            }
        }

        function manualRefresh() {
            countdown = 0;
            fetchData();
        }

        function startAutoUpdate() {
            setInterval(() => {
                if (!isAutoRefresh) return;
                countdown--;
                if (countdown <= 0) {
                    countdown = 3;
                    fetchData();
                }
                document.getElementById('countdown').textContent = countdown;
            }, 1000);
        }

        // 可见性变化处理
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && isAutoRefresh) {
                fetchData();
            }
        });
    </script>
</body>
</html>

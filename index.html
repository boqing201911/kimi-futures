<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Futures Arbitrage Monitor | 全球期货溢价监控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Animations */
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }
        .pulse-up { animation: pulse-green 2s infinite; }
        .pulse-down { animation: pulse-red 2s infinite; }
        
        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Grid Background */
        .grid-bg {
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        /* Ticker Animation */
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .ticker-wrap {
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker-content {
            display: inline-block;
            animation: ticker 30s linear infinite;
        }
        
        /* Neon Glow */
        .glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>
<body class="grid-bg min-h-screen overflow-x-hidden">

    <!-- Header -->

                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">Futures<span class="gradient-text">Arb</span></h1>

                </div>

        </div>
        
        <!-- Ticker -->

    </header>

    <!-- Main Content -->
    <main class="pt-32 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
        
        <!-- Stats Overview -->

            <div class="glass rounded-xl p-6 glow">

            <div class="glass rounded-xl p-6 glow">

            </div>
            <div class="glass rounded-xl p-6 glow">
                <div class="text-slate-400 text-sm mb-1">数据更新</div>
                <div class="text-3xl font-bold text-purple-400">实时</div>
                <div class="text-xs text-slate-500 mt-1">WebSocket连接正常</div>

        <!-- Filters -->
        <div class="glass rounded-xl p-4 mb-6 flex flex-wrap gap-3 items-center justify-between">
            <div class="flex gap-2">
                <button onclick="filterCategory('all')" class="filter-btn px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium transition-all hover:bg-blue-700 active" data-category="all">全部</button>
                <button onclick="filterCategory('metal')" class="filter-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300 text-sm font-medium transition-all hover:bg-slate-600" data-category="metal">贵金属/有色</button>
                <button onclick="filterCategory('energy')" class="filter-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300 text-sm font-medium transition-all hover:bg-slate-600" data-category="energy">能源化工</button>
                <button onclick="filterCategory('agri')" class="filter-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300 text-sm font-medium transition-all hover:bg-slate-600" data-category="agri">农产品</button>
                <button onclick="filterCategory('financial')" class="filter-btn px-4 py-2 rounded-lg bg-slate-700 text-slate-300 text-sm font-medium transition-all hover:bg-slate-600" data-category="financial">金融期货</button>
            </div>
            <div class="flex items-center gap-2 text-sm text-slate-400">
                <span>排序:</span>
                <select onchange="sortData(this.value)" class="bg-slate-800 border border-slate-600 rounded px-3 py-1 text-white focus:outline-none focus:border-blue-500">
                    <option value="premium-desc">溢价率 (高→低)</option>
                    <option value="premium-asc">溢价率 (低→高)</option>
                    <option value="volume">成交量</option>
                    <option value="name">品种名称</option>
                </select>
            </div>
        </div>

        <!-- Futures Pairs Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" id="futures-grid">
            <!-- Cards will be injected here by JS -->
        </div>

        <!-- Chart Section -->
        <div class="mt-8 glass rounded-xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-semibold text-white">溢价率历史走势</h3>
                <div class="flex gap-2">
                    <button onclick="changeTimeframe('1H')" class="time-btn px-3 py-1 rounded text-xs bg-blue-600 text-white">1H</button>
                    <button onclick="changeTimeframe('1D')" class="time-btn px-3 py-1 rounded text-xs bg-slate-700 text-slate-300 hover:bg-slate-600">1D</button>
                    <button onclick="changeTimeframe('1W')" class="time-btn px-3 py-1 rounded text-xs bg-slate-700 text-slate-300 hover:bg-slate-600">1W</button>
                </div>
            </div>
            <div class="h-64 w-full">
                <canvas id="premiumChart"></canvas>
            </div>
        </div>

        <!-- Arbitrage Calculator -->
        <div class="mt-8 glass rounded-xl p-6">
            <h3 class="text-lg font-semibold text-white mb-4">套利计算器</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">选择品种对</label>
                    <select id="calc-pair" onchange="updateCalc()" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                        <!-- Options injected by JS -->
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">国内合约价格 (CNY)</label>
                    <input type="number" id="calc-domestic" oninput="calculateArbitrage()" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white mono focus:outline-none focus:border-blue-500" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">国际合约价格 (USD)</label>
                    <input type="number" id="calc-international" oninput="calculateArbitrage()" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white mono focus:outline-none focus:border-blue-500" placeholder="0.00">
                </div>
            </div>
            <div class="mt-6 p-4 bg-slate-800/50 rounded-lg border border-slate-700">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                    <div>
                        <div class="text-xs text-slate-500 mb-1">理论溢价率</div>
                        <div class="text-xl font-bold mono" id="calc-premium">--</div>
                    </div>
                    <div>
                        <div class="text-xs text-slate-500 mb-1">汇率因子</div>
                        <div class="text-xl font-bold mono text-blue-400" id="calc-fx">7.2450</div>
                    </div>
                    <div>
                        <div class="text-xs text-slate-500 mb-1">合约规模比</div>
                        <div class="text-xl font-bold mono text-purple-400" id="calc-ratio">1:1</div>
                    </div>
                    <div>
                        <div class="text-xs text-slate-500 mb-1">建议操作</div>
                        <div class="text-xl font-bold" id="calc-signal">--</div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Futures Data Configuration based on search results [^13^]
        const futuresPairs = [
            {
                id: 'crude-oil',

            {

            },
            {

                conversion: 0.367437, // bushels to metric tons conversion
                description: 'CBOT大豆 vs 豆一'
            },
            {

                category: 'agri',
                name: '玉米期货',
                domestic: { exchange: 'DCE', code: 'C', name: '大连商品交易所', unit: '元/吨', contract: 10 },
                international: { exchange: 'CBOT', code: 'ZC', name: '芝加哥商品交易所', unit: '美分/蒲式耳', contract: 5000 },
                fxRate: 7.245,
                conversion: 0.393683,
                description: 'CBOT玉米 vs 大商所玉米'
            },
            {
                id: 'wheat',
                category: 'agri',
                name: '强麦期货',
                domestic: { exchange: 'ZCE', code: 'WH', name: '郑州商品交易所', unit: '元/吨', contract: 20 },
                international: { exchange: 'CBOT', code: 'ZW', name: '芝加哥商品交易所', unit: '美分/蒲式耳', contract: 5000 },
                fxRate: 7.245,
                conversion: 0.367437,
                description: 'CBOT小麦 vs 郑商所强麦'
            },
            {
                id: 'csi300',
                category: 'financial',
                name: '股指期货',
                domestic: { exchange: 'CFFEX', code: 'IF', name: '中国金融期货交易所', unit: '指数点', contract: 300 },
                international: { exchange: 'CME', code: 'ES', name: '芝加哥商品交易所', unit: '指数点', contract: 50 },
                fxRate: 7.245,
                conversion: 1,
                description: '标普500 E-mini vs 沪深300'
            },
            {
                id: 'bond10y',
                category: 'financial',
                name: '国债期货',
                domestic: { exchange: 'CFFEX', code: 'T', name: '中国金融期货交易所', unit: '元', contract: 10000 },
                international: { exchange: 'CME', code: 'ZN', name: '芝加哥商品交易所', unit: '美元', contract: 1000 },
                fxRate: 7.245,
                conversion: 1,
                description: '10年期美债 vs 10年期国债'
            },
            {
                id: 'aluminum',
                category: 'metal',
                name: '铝期货',
                domestic: { exchange: 'SHFE', code: 'AL', name: '上海期货交易所', unit: '元/吨', contract: 5 },
                international: { exchange: 'LME', code: 'AH', name: '伦敦金属交易所', unit: '美元/吨', contract: 25 },
                fxRate: 7.245,
                conversion: 1,
                description: 'LME铝 vs 沪铝'
            },
            {
                id: 'silver',
                category: 'metal',
                name: '白银期货',
                domestic: { exchange: 'SHFE', code: 'AG', name: '上海期货交易所', unit: '元/千克', contract: 15 },
                international: { exchange: 'COMEX', code: 'SI', name: '纽约商品交易所', unit: '美元/盎司', contract: 5000 },
                fxRate: 7.245,
                conversion: 32.1507,
                description: 'COMEX银 vs 沪银'
            },
            {
                id: 'rubber',
                category: 'agri',
                name: '天然橡胶',
                domestic: { exchange: 'SHFE', code: 'RU', name: '上海期货交易所', unit: '元/吨', contract: 10 },
                international: { exchange: 'OSE', code: 'JRU', name: '大阪交易所', unit: '日元/千克', contract: 5000 },
                fxRate: 0.0485, // JPY to CNY
                conversion: 1000,
                description: '日胶 vs 沪胶'
            },
            {
                id: 'iron-ore',
                category: 'metal',
                name: '铁矿石',
                domestic: { exchange: 'DCE', code: 'I', name: '大连商品交易所', unit: '元/吨', contract: 100 },
                international: { exchange: 'SGX', code: 'FEF', name: '新交所', unit: '美元/吨', contract: 100 },
                fxRate: 7.245,
                conversion: 1,
                description: '新交所铁矿 vs 大商所铁矿'
            }
        ];

        let currentData = [];
        let chartInstance = null;
        let currentFilter = 'all';
        let currentSort = 'premium-desc';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initClock();
            initData();
            initChart();
            initCalculator();
            startRealTimeUpdates();
            generateTicker();
        });

        function initClock() {
            setInterval(() => {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
                const dateStr = now.toLocaleDateString('zh-CN');
                document.getElementById('clock').textContent = `${dateStr} ${timeStr}`;
            }, 1000);
        }

        function initData() {
            // Generate simulated realistic market data
            currentData = futuresPairs.map(pair => {
                const basePrice = getBasePrice(pair.id);
                const volatility = getVolatility(pair.category);
                
                const domesticPrice = basePrice * (1 + (Math.random() - 0.5) * volatility);
                const internationalPrice = (basePrice / pair.fxRate / pair.conversion) * (1 + (Math.random() - 0.5) * volatility * 0.8);
                
                // Calculate premium: (Domestic - International_converted) / International_converted * 100
                const intlConverted = internationalPrice * pair.fxRate * pair.conversion;
                const premium = ((domesticPrice - intlConverted) / intlConverted) * 100;
                
                return {
                    ...pair,
                    domesticPrice: domesticPrice,
                    internationalPrice: internationalPrice,
                    premium: premium,
                    domesticChange: (Math.random() - 0.5) * 2,
                    internationalChange: (Math.random() - 0.5) * 2,
                    volume: Math.floor(Math.random() * 1000000) + 50000,
                    timestamp: new Date()
                };
            });
            
            renderGrid();
            updateStats();
        }

        function getBasePrice(id) {
            const prices = {
                'crude-oil': 520,
                'copper': 68000,
                'gold': 480,
                'soybean': 4200,
                'corn': 2400,
                'wheat': 2800,
                'csi300': 3650,
                'bond10y': 102.5,
                'aluminum': 19500,
                'silver': 5800,
                'rubber': 14500,
                'iron-ore': 780
            };
            return prices[id] || 1000;
        }

        function getVolatility(category) {
            const vols = { metal: 0.02, energy: 0.025, agri: 0.015, financial: 0.01 };
            return vols[category] || 0.02;
        }

        function renderGrid() {
            const grid = document.getElementById('futures-grid');
            grid.innerHTML = '';
            
            let filtered = currentData;
            if (currentFilter !== 'all') {
                filtered = filtered.filter(item => item.category === currentFilter);
            }
            
            // Sort
            filtered.sort((a, b) => {
                switch(currentSort) {
                    case 'premium-desc': return b.premium - a.premium;
                    case 'premium-asc': return a.premium - b.premium;
                    case 'volume': return b.volume - a.volume;
                    case 'name': return a.name.localeCompare(b.name);
                    default: return 0;
                }
            });
            
            filtered.forEach(item => {
                const premiumClass = item.premium > 0 ? 'text-green-400' : 'text-red-400';
                const premiumBg = item.premium > 0 ? 'bg-green-500/10 border-green-500/30' : 'bg-red-500/10 border-red-500/30';
                const pulseClass = Math.abs(item.premium) > 2 ? (item.premium > 0 ? 'pulse-up' : 'pulse-down') : '';
                
                const card = document.createElement('div');
                card.className = `glass rounded-xl p-6 border ${premiumBg} ${pulseClass} transition-all hover:scale-[1.02] cursor-pointer`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="text-lg font-bold text-white">${item.name}</h3>
                                <span class="px-2 py-0.5 rounded text-xs bg-slate-700 text-slate-300">${item.id.toUpperCase()}</span>
                            </div>
                            <p class="text-xs text-slate-400">${item.description}</p>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold mono ${premiumClass}">${item.premium > 0 ? '+' : ''}${item.premium.toFixed(2)}%</div>
                            <div class="text-xs text-slate-500">溢价率</div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="bg-slate-800/50 rounded-lg p-3 border border-slate-700">
                            <div class="flex items-center gap-2 mb-2">
                                <div class="w-2 h-2 rounded-full bg-red-500"></div>
                                <span class="text-xs text-slate-400">国内 ${item.domestic.exchange}</span>
                            </div>
                            <div class="text-lg font-bold mono text-white">${item.domesticPrice.toFixed(item.domesticPrice > 1000 ? 0 : 2)}</div>
                            <div class="text-xs ${item.domesticChange > 0 ? 'text-green-400' : 'text-red-400'}">
                                ${item.domesticChange > 0 ? '↑' : '↓'} ${Math.abs(item.domesticChange).toFixed(2)}%
                            </div>
                        </div>
                        
                        <div class="bg-slate-800/50 rounded-lg p-3 border border-slate-700">
                            <div class="flex items-center gap-2 mb-2">
                                <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                                <span class="text-xs text-slate-400">国际 ${item.international.exchange}</span>
                            </div>
                            <div class="text-lg font-bold mono text-white">${item.internationalPrice.toFixed(item.internationalPrice > 100 ? 2 : 4)}</div>
                            <div class="text-xs ${item.internationalChange > 0 ? 'text-green-400' : 'text-red-400'}">
                                ${item.internationalChange > 0 ? '↑' : '↓'} ${Math.abs(item.internationalChange).toFixed(2)}%
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center text-xs text-slate-500 border-t border-slate-700/50 pt-3">
                        <span>汇率: ${item.fxRate}</span>
                        <span>成交量: ${(item.volume/10000).toFixed(1)}万手</span>
                        <span>${item.timestamp.toLocaleTimeString()}</span>
                    </div>
                    
                    <div class="mt-3 flex gap-2">
                        <button onclick="showDetail('${item.id}')" class="flex-1 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-white text-sm transition-colors">详情</button>
                        <button onclick="selectForCalc('${item.id}')" class="flex-1 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm transition-colors">计算套利</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateStats() {
            const premiums = currentData.map(d => d.premium);
            const avg = premiums.reduce((a, b) => a + b, 0) / premiums.length;
            const max = Math.max(...premiums.map(Math.abs));
            
            document.getElementById('avg-premium').textContent = (avg > 0 ? '+' : '') + avg.toFixed(2) + '%';
            document.getElementById('avg-premium').className = `text-3xl font-bold ${avg > 0 ? 'text-green-400' : 'text-red-400'}`;
            document.getElementById('max-arbitrage').textContent = max.toFixed(2) + '%';
        }

        function filterCategory(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.category === category) {
                    btn.classList.remove('bg-slate-700', 'text-slate-300');
                    btn.classList.add('bg-blue-600', 'text-white');
                } else {
                    btn.classList.add('bg-slate-700', 'text-slate-300');
                    btn.classList.remove('bg-blue-600', 'text-white');
                }
            });
            renderGrid();
        }

        function sortData(sortType) {
            currentSort = sortType;
            renderGrid();
        }

        function initChart() {
            const ctx = document.getElementById('premiumChart').getContext('2d');
            const labels = Array.from({length: 20}, (_, i) => {
                const d = new Date();
                d.setMinutes(d.getMinutes() - (19 - i) * 5);
                return d.getHours() + ':' + d.getMinutes().toString().padStart(2, '0');
            });
            
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '铜期货溢价率',
                        data: Array.from({length: 20}, () => (Math.random() - 0.5) * 4),
                        borderColor: '#60a5fa',
                        backgroundColor: 'rgba(96, 165, 250, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }, {
                        label: '原油溢价率',
                        data: Array.from({length: 20}, () => (Math.random() - 0.5) * 3),
                        borderColor: '#a78bfa',
                        backgroundColor: 'rgba(167, 139, 250, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#94a3b8' }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#64748b' }
                        },
                        x: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#64748b' }
                        }
                    }
                }
            });
        }

        function changeTimeframe(tf) {
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-slate-700', 'text-slate-300');
            });
            event.target.classList.remove('bg-slate-700', 'text-slate-300');
            event.target.classList.add('bg-blue-600', 'text-white');
            
            // Update chart data simulation
            if (chartInstance) {
                chartInstance.data.datasets.forEach(dataset => {
                    dataset.data = Array.from({length: 20}, () => (Math.random() - 0.5) * 5);
                });
                chartInstance.update();
            }
        }

        function initCalculator() {
            const select = document.getElementById('calc-pair');
            futuresPairs.forEach(pair => {
                const option = document.createElement('option');
                option.value = pair.id;
                option.textContent = `${pair.name} (${pair.domestic.code}/${pair.international.code})`;
                select.appendChild(option);
            });
            updateCalc();
        }

        function updateCalc() {
            const pairId = document.getElementById('calc-pair').value;
            const pair = futuresPairs.find(p => p.id === pairId);
            if (pair) {
                document.getElementById('calc-fx').textContent = pair.fxRate.toFixed(4);
                document.getElementById('calc-ratio').textContent = `1:${pair.conversion === 1 ? '1' : pair.conversion.toFixed(2)}`;
                
                // Set example prices
                const current = currentData.find(d => d.id === pairId);
                if (current) {
                    document.getElementById('calc-domestic').value = current.domesticPrice.toFixed(2);
                    document.getElementById('calc-international').value = current.internationalPrice.toFixed(2);
                    calculateArbitrage();
                }
            }
        }

        function selectForCalc(pairId) {
            document.getElementById('calc-pair').value = pairId;
            updateCalc();
            document.querySelector('.glass.rounded-xl.p-6:last-child').scrollIntoView({ behavior: 'smooth' });
        }

        function calculateArbitrage() {
            const pairId = document.getElementById('calc-pair').value;
            const pair = futuresPairs.find(p => p.id === pairId);
            const domestic = parseFloat(document.getElementById('calc-domestic').value) || 0;
            const international = parseFloat(document.getElementById('calc-international').value) || 0;
            
            if (domestic && international && pair) {
                const converted = international * pair.fxRate * pair.conversion;
                const premium = ((domestic - converted) / converted) * 100;
                
                document.getElementById('calc-premium').textContent = (premium > 0 ? '+' : '') + premium.toFixed(2) + '%';
                document.getElementById('calc-premium').className = 'text-xl font-bold mono ' + (premium > 0 ? 'text-green-400' : 'text-red-400');
                
                const signal = document.getElementById('calc-signal');
                if (Math.abs(premium) < 0.5) {
                    signal.textContent = '持仓观望';
                    signal.className = 'text-xl font-bold text-slate-400';
                } else if (premium > 0) {
                    signal.textContent = '正向套利';
                    signal.className = 'text-xl font-bold text-green-400';
                } else {
                    signal.textContent = '反向套利';
                    signal.className = 'text-xl font-bold text-red-400';
                }
            }
        }

        function startRealTimeUpdates() {
            setInterval(() => {
                // Simulate price updates
                currentData.forEach(item => {
                    const change = (Math.random() - 0.5) * 0.002;
                    item.domesticPrice *= (1 + change);
                    item.internationalPrice *= (1 + change * 0.8);
                    
                    const intlConverted = item.internationalPrice * item.fxRate * item.conversion;
                    item.premium = ((item.domesticPrice - intlConverted) / intlConverted) * 100;
                    item.timestamp = new Date();
                });
                
                renderGrid();
                updateStats();
                
                // Update chart occasionally
                if (Math.random() > 0.7 && chartInstance) {
                    chartInstance.data.datasets.forEach(dataset => {
                        dataset.data.shift();
                        dataset.data.push((Math.random() - 0.5) * 4);
                    });
                    chartInstance.update('none');
                }
            }, 3000);
        }

        function generateTicker() {
            const ticker = document.getElementById('ticker');
            const items = [
                'SC原油: +1.2% | CL原油: +0.8% | 溢价: +0.4%',
                '沪铜: -0.5% | LME铜: -0.3% | 溢价: -0.2%',
                '沪金: +0.3% | COMEX金: +0.2% | 溢价: +0.1%',
                '豆一: -0.8% | CBOT大豆: -1.2% | 溢价: +0.4%',
                '铁矿: +2.1% | 新交所铁矿: +1.9% | 溢价: +0.2%',
                '沪深300: +0.5% | 标普500: +0.3% | 溢价: +0.2%'
            ];
            ticker.innerHTML = items.join(' &nbsp;&nbsp;•&nbsp;&nbsp; ') + ' &nbsp;&nbsp;•&nbsp;&nbsp; ' + items.join(' &nbsp;&nbsp;•&nbsp;&nbsp; ');
        }

        function showDetail(id) {
            alert('详情功能：显示' + id + '的历史数据、基差分析、季节性图表等（在实际应用中将展开模态框）');
        }
    </script>
</body>
</html>
